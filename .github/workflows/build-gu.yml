name: Build osu! Torii

on:
  push:
    branches: [ main, master, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.0.0)'
        required: false
        default: '1.0.0-dev'
  release:
    types: [ published ]

env:
  DOTNET_VERSION: '8.0.x'
  FRAMEWORK_REPOSITORY: 'ShikkesoraSIM/torii-framework'
  FRAMEWORK_REF: 'c3faa58909d18343896dd48b395397298f6082c0'
  RESOURCES_REPOSITORY: 'ShikkesoraSIM/torii-resources'
  RESOURCES_REF: '8bfcf3dc5732a15e3c1a81ff5d053e445ee7df7f'

jobs:
  version:
    name: Compute version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      semver: ${{ steps.version.outputs.semver }}
      assemblyVersion: ${{ steps.version.outputs.assemblyVersion }}
      fileVersion: ${{ steps.version.outputs.fileVersion }}
      androidVersionCode: ${{ steps.version.outputs.androidVersionCode }}
    steps:
    - name: Checkout (for commit count)
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Determine version
      id: version
      shell: bash
      run: |
        if [[ "${{ github.event_name }}" == "workflow_run" ]]; then
          git fetch --tags --force
          LAST_TAG=$(git tag -l 'v*' --sort=-creatordate | head -n1)
          if [[ -n "$LAST_TAG" ]]; then
            VERSION="$LAST_TAG"
            SEMVER=${VERSION#v}
            NUMERIC=${SEMVER%%-*}
            PARTS=$(echo "$NUMERIC" | awk -F. '{print NF}')
            if [[ $PARTS -eq 1 ]]; then NUMERIC="$NUMERIC.0.0.0"; fi
            if [[ $PARTS -eq 2 ]]; then NUMERIC="$NUMERIC.0.0"; fi
            if [[ $PARTS -eq 3 ]]; then NUMERIC="$NUMERIC.0"; fi
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "semver=$SEMVER" >> $GITHUB_OUTPUT
            echo "assemblyVersion=$NUMERIC" >> $GITHUB_OUTPUT
            echo "fileVersion=$NUMERIC" >> $GITHUB_OUTPUT
            # Compute Android VersionCode from numeric version components.
            VERSION_NUMBERS=$(echo "$SEMVER" | sed 's/-.*$//' | tr -d '.')
            ANDROID_VERSION_CODE="$VERSION_NUMBERS"
            echo "androidVersionCode=$ANDROID_VERSION_CODE" >> $GITHUB_OUTPUT
            echo "Computed version from latest tag (workflow_run): $VERSION (android: $ANDROID_VERSION_CODE)"
            exit 0
          fi
        fi
        if [[ "${{ github.event_name }}" == "release" ]]; then
          VERSION="${{ github.event.release.tag_name }}"
        elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
          VERSION="${{ github.ref_name }}"
        elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]] && [[ -n "${{ github.event.inputs.version }}" ]]; then
          VERSION="${{ github.event.inputs.version }}"
        elif [[ "${{ github.ref }}" == "refs/heads/main" ]] || [[ "${{ github.ref }}" == "refs/heads/master" ]]; then
          COMMIT_COUNT=$(git rev-list --count HEAD)
          BUILD_NUMBER=$((COMMIT_COUNT % 10000))
          VERSION="1.0.$BUILD_NUMBER"
        else
          COMMIT_COUNT=$(git rev-list --count HEAD)
          BUILD_NUMBER=$((COMMIT_COUNT % 10000))
          VERSION="0.9.$BUILD_NUMBER"
        fi

        SEMVER=${VERSION#v}
        NUMERIC=${SEMVER%%-*}
        PARTS=$(echo "$NUMERIC" | awk -F. '{print NF}')
        if [[ $PARTS -eq 1 ]]; then NUMERIC="$NUMERIC.0.0.0"; fi
        if [[ $PARTS -eq 2 ]]; then NUMERIC="$NUMERIC.0.0"; fi
        if [[ $PARTS -eq 3 ]]; then NUMERIC="$NUMERIC.0"; fi

        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "semver=$SEMVER" >> $GITHUB_OUTPUT
        echo "assemblyVersion=$NUMERIC" >> $GITHUB_OUTPUT
        echo "fileVersion=$NUMERIC" >> $GITHUB_OUTPUT
        
        # Compute Android VersionCode (must be an integer).
        # e.g. v2025.815.5-lazer -> 2025.815.5 -> 20258155
        VERSION_NUMBERS=$(echo "$SEMVER" | sed 's/-.*$//' | tr -d '.')
        ANDROID_VERSION_CODE="$VERSION_NUMBERS"
        echo "androidVersionCode=$ANDROID_VERSION_CODE" >> $GITHUB_OUTPUT
        
        echo "Computed version: $VERSION (semver: $SEMVER, assembly/file: $NUMERIC, android: $ANDROID_VERSION_CODE)"

  build:
    name: Build ${{ matrix.runtime }} on ${{ matrix.os }}
    needs: version
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    # Prevent concurrent builds from interfering with each other's NuGet operations
    concurrency:
      group: build-${{ matrix.os }}-${{ matrix.runtime }}
      cancel-in-progress: false
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            runtime: win-x64
            artifact-name: osu-torii-windows
            executable: osu-torii.exe
          - os: windows-latest
            runtime: win-arm64
            artifact-name: osu-torii-windows-arm64
            executable: osu-torii.exe
          - os: ubuntu-latest
            runtime: linux-x64
            artifact-name: osu-torii-linux
            executable: osu-torii
          - os: ubuntu-latest
            runtime: linux-arm64
            artifact-name: osu-torii-linux-arm64
            executable: osu-torii
          - os: ubuntu-latest
            runtime: osx-x64
            artifact-name: osu-torii-macos-intel
            executable: osu-torii
          - os: ubuntu-latest
            runtime: osx-arm64
            artifact-name: osu-torii-macos-apple-silicon
            executable: osu-torii
          - os: ubuntu-latest
            runtime: android
            artifact-name: osu-torii-android
            executable: osu.Android-Signed.apk

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        # Ensure we have complete git history for version calculation
        # Use the release tag when triggered by a Release event, otherwise the triggering SHA
        ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.sha }}

    - name: Checkout osu-framework dependency
      uses: actions/checkout@v4
      with:
        repository: ${{ env.FRAMEWORK_REPOSITORY }}
        fetch-depth: 1
        ref: ${{ env.FRAMEWORK_REF }}
        path: osu-framework

    - name: Checkout osu-resources dependency
      uses: actions/checkout@v4
      with:
        repository: ${{ env.RESOURCES_REPOSITORY }}
        fetch-depth: 1
        ref: ${{ env.RESOURCES_REF }}
        path: osu-resources

    - name: Place dependencies in expected sibling paths
      shell: bash
      run: |
        rm -rf ../osu-framework ../osu-resources
        mv osu-framework ../osu-framework
        mv osu-resources ../osu-resources

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Setup Java for Android (Android only)
      if: matrix.runtime == 'android'
      uses: actions/setup-java@v4
      with:
        distribution: 'microsoft'
        java-version: '17'

    - name: Setup Android SDK (Android only)
      if: matrix.runtime == 'android'
      uses: android-actions/setup-android@v3
      with:
        cmdline-tools-version: 8512546

    - name: Accept Android SDK licenses (Android only)
      if: matrix.runtime == 'android'
      shell: bash
      run: |
        yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true

    - name: Install Android workload (Android only)
      if: matrix.runtime == 'android'
      shell: bash
      run: |
        dotnet workload install android
        dotnet workload list
        echo "Android SDK Root: $ANDROID_SDK_ROOT"
        echo "Java Home: $JAVA_HOME"

    - name: Install Velopack CLI
      shell: bash
      run: dotnet tool install -g vpk

    - name: Create macOS icon (macOS only)
      if: startsWith(matrix.os, 'macos-')
      continue-on-error: true
      shell: bash
      run: |
        # Convert .ico to .icns on macOS
        if [ -f "osu.Desktop/lazer.ico" ]; then
          echo "Converting lazer.ico to lazer.icns for macOS..."
          # First convert ico to png to avoid format issues
          sips -s format png osu.Desktop/lazer.ico --out temp_icon.png || {
            echo "Warning: Failed to convert ico to png, trying alternative method..."
            # Fallback: just copy the ico file and rename it
            cp osu.Desktop/lazer.ico osu.Desktop/lazer.icns
            echo "Using .ico file as fallback for macOS icon"
            exit 0
          }

          # Create iconset directory
          mkdir -p lazer.iconset

          # Generate different sizes from the converted PNG
          sips -z 16 16     temp_icon.png --out lazer.iconset/icon_16x16.png
          sips -z 32 32     temp_icon.png --out lazer.iconset/icon_16x16@2x.png
          sips -z 32 32     temp_icon.png --out lazer.iconset/icon_32x32.png
          sips -z 64 64     temp_icon.png --out lazer.iconset/icon_32x32@2x.png
          sips -z 128 128   temp_icon.png --out lazer.iconset/icon_128x128.png
          sips -z 256 256   temp_icon.png --out lazer.iconset/icon_128x128@2x.png
          sips -z 256 256   temp_icon.png --out lazer.iconset/icon_256x256.png
          sips -z 512 512   temp_icon.png --out lazer.iconset/icon_256x256@2x.png
          sips -z 512 512   temp_icon.png --out lazer.iconset/icon_512x512.png
          cp lazer.iconset/icon_512x512.png lazer.iconset/icon_512x512@2x.png

          # Create the icns file
          iconutil -c icns lazer.iconset || {
            echo "Warning: iconutil failed, using fallback method..."
            cp osu.Desktop/lazer.ico osu.Desktop/lazer.icns
            rm -f temp_icon.png
            rm -rf lazer.iconset
            exit 0
          }

          # Copy the result and cleanup
          cp lazer.icns osu.Desktop/lazer.icns
          rm -f temp_icon.png
          rm -rf lazer.iconset
          echo "Successfully created lazer.icns"
        else
          echo "Warning: lazer.ico not found, creating placeholder icns"
          # Create a simple placeholder if the ico file doesn't exist
          touch osu.Desktop/lazer.icns
        fi

    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.nuget/packages
          ~/.local/share/NuGet/v3-cache
          ~/.cache/NuGet/v3-cache
        key: ${{ runner.os }}-${{ matrix.runtime }}-nuget-${{ hashFiles('**/*.csproj', '**/packages.lock.json', 'nuget.config') }}
        restore-keys: |
          ${{ runner.os }}-${{ matrix.runtime }}-nuget-${{ hashFiles('**/*.csproj') }}
          ${{ runner.os }}-${{ matrix.runtime }}-nuget-
          ${{ runner.os }}-nuget-

    - name: Show version
      shell: bash
      run: |
        echo "Building version: ${{ needs.version.outputs.version }} (semver: ${{ needs.version.outputs.semver }}, assembly/file: ${{ needs.version.outputs.fileVersion }}, android: ${{ needs.version.outputs.androidVersionCode }})"

    - name: Clean previous build artifacts
      shell: bash
      run: |
        echo "Cleaning previous build artifacts for ${{ matrix.runtime }}"
        if [[ "${{ matrix.runtime }}" == "android" ]]; then
          rm -rf osu.Android/bin osu.Android/obj
        else
          rm -rf osu.Desktop/bin osu.Desktop/obj
        fi
        rm -rf publish/${{ matrix.runtime }}

    - name: Restore dependencies for specific runtime
      timeout-minutes: 15
      shell: bash
      run: |
        echo "Restoring packages for runtime: ${{ matrix.runtime }}"
        if [[ "${{ matrix.runtime }}" == "android" ]]; then
          dotnet restore osu.Android/osu.Android.csproj \
            --verbosity normal \
            --configfile nuget.config \
            --no-cache \
            --force
        else
          dotnet restore osu.Desktop/osu.Desktop.csproj \
            --runtime ${{ matrix.runtime }} \
            --verbosity normal \
            --configfile nuget.config \
            --no-cache \
            --force
        fi

    - name: Setup Android signing (Android only)
      if: matrix.runtime == 'android'
      shell: bash
      env:
        ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      run: |
        echo "Setting up Android keystore for signing..."
        # Use the base64-encoded keystore from secrets when available.
        if [[ -n "$ANDROID_KEYSTORE_BASE64" ]]; then
          echo "Using keystore from GitHub Secrets"
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > osu.keystore
          
          # Verify decoded keystore file.
          if [[ ! -f "osu.keystore" ]] || [[ ! -s "osu.keystore" ]]; then
            echo "ERROR: Failed to decode keystore from base64"
            exit 1
          fi
          
          # Verify keystore credentials.
          if [[ -z "$ANDROID_KEYSTORE_PASSWORD" ]] || [[ -z "$ANDROID_KEY_ALIAS" ]] || [[ -z "$ANDROID_KEY_PASSWORD" ]]; then
            echo "ERROR: Android signing secrets are incomplete!"
            echo "Required secrets: ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD"
            exit 1
          fi
          
          # Validate keystore access.
          echo "Verifying keystore integrity..."
          keytool -list -keystore osu.keystore -storepass "$ANDROID_KEYSTORE_PASSWORD" -alias "$ANDROID_KEY_ALIAS" || {
            echo "ERROR: Cannot access keystore with provided credentials"
            exit 1
          }
          
          echo "Keystore setup successful"
        else
          echo "No keystore found in secrets, creating temporary one..."
          keytool -genkey -v \
            -keystore osu.keystore \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -alias osu \
            -storepass temp123 \
            -keypass temp123 \
            -dname "CN=osu-torii-temp,OU=osu-torii,O=osu-torii,L=Unknown,S=Unknown,C=Unknown"
          echo "WARNING: Using temporary keystore! Please configure ANDROID_KEYSTORE_BASE64 secret for production builds."
        fi

    - name: Build and publish
      shell: bash
      env:
        ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      run: |
        echo "Building for runtime: ${{ matrix.runtime }}"
        if [[ "${{ matrix.runtime }}" == "android" ]]; then
          # Build Android APK
          # Prefer signing values from secrets, fallback to temporary defaults.
          KEYSTORE_PASS="${ANDROID_KEYSTORE_PASSWORD:-temp123}"
          KEY_ALIAS="${ANDROID_KEY_ALIAS:-osu}"
          KEY_PASS="${ANDROID_KEY_PASSWORD:-temp123}"
          
          echo "Using Java version: $(java -version 2>&1 | head -n 1)"
          echo "Android SDK Root: $ANDROID_SDK_ROOT"
          echo "Keystore file exists: $(test -f osu.keystore && echo 'Yes' || echo 'No')"
          echo "Using key alias: $KEY_ALIAS"
          
          # Ensure keystore exists before publish.
          if [[ ! -f "osu.keystore" ]]; then
            echo "ERROR: Keystore file not found!"
            exit 1
          fi
          
          dotnet publish osu.Android/osu.Android.csproj \
            --configuration Release \
            --verbosity normal \
            --no-restore \
            -p:Version=${{ needs.version.outputs.semver }} \
            -p:ApplicationVersion=${{ needs.version.outputs.androidVersionCode }} \
            -p:ApplicationDisplayVersion=${{ needs.version.outputs.semver }} \
            -p:AndroidSdkDirectory=$ANDROID_SDK_ROOT \
            -p:AndroidKeyStore=true \
            -p:AndroidSigningKeyStore=../osu.keystore \
            -p:AndroidSigningKeyAlias="$KEY_ALIAS" \
            -p:AndroidSigningKeyPass="$KEY_PASS" \
            -p:AndroidSigningStorePass="$KEYSTORE_PASS" \
            -p:AndroidPackageFormat=apk
          
          # Create output directory and copy APK
          mkdir -p "publish/${{ matrix.runtime }}"
          
          # Find the signed APK
          APK_FILE=$(find osu.Android/bin/Release/ -name "*.apk" | head -1)
          if [[ -z "$APK_FILE" ]]; then
            echo "ERROR: No APK file found after build!"
            exit 1
          fi
          
          echo "Found APK: $APK_FILE"
          cp "$APK_FILE" "publish/${{ matrix.runtime }}/${{ matrix.executable }}"
          
          # Optionally inspect resulting APK metadata.
          if command -v aapt2 &> /dev/null; then
            echo "Verifying APK signature..."
            aapt2 dump badging "publish/${{ matrix.runtime }}/${{ matrix.executable }}" | grep -E "application-label|package" || true
          fi
        else
          # Desktop build
          dotnet publish osu.Desktop/osu.Desktop.csproj \
            --self-contained \
            --runtime ${{ matrix.runtime }} \
            --configuration Release \
            --output "publish/${{ matrix.runtime }}" \
            --no-restore \
            --verbosity normal \
            -p:PublishSingleFile=false \
            -p:PublishTrimmed=false \
            -p:Version=${{ needs.version.outputs.semver }} \
            -p:FileVersion=${{ needs.version.outputs.fileVersion }} \
            -p:AssemblyVersion=${{ needs.version.outputs.assemblyVersion }} \
            -p:InformationalVersion=${{ needs.version.outputs.version }}
        fi

    - name: Resolve desktop executable name
      if: matrix.runtime != 'android'
      shell: bash
      run: |
        PUBLISH_DIR="publish/${{ matrix.runtime }}"
        EXPECTED="${{ matrix.executable }}"
        RESOLVED="$EXPECTED"

        if [[ ! -f "$PUBLISH_DIR/$EXPECTED" ]]; then
          echo "Expected executable missing: $PUBLISH_DIR/$EXPECTED"
          CANDIDATE=""

          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            for f in "$PUBLISH_DIR"/*.exe; do
              if [[ -f "$f" ]]; then
                CANDIDATE="$f"
                break
              fi
            done
          else
            for f in "$PUBLISH_DIR"/*; do
              [[ -f "$f" ]] || continue
              name=$(basename "$f")
              [[ "$name" == osu* ]] || continue
              [[ "$name" == *.dll ]] && continue
              [[ "$name" == *.deps.json ]] && continue
              [[ "$name" == *.runtimeconfig.json ]] && continue
              CANDIDATE="$f"
              break
            done

            if [[ -z "$CANDIDATE" ]]; then
              for f in "$PUBLISH_DIR"/*; do
                if [[ -f "$f" ]]; then
                  CANDIDATE="$f"
                  break
                fi
              done
            fi
          fi

          if [[ -n "$CANDIDATE" ]]; then
            RESOLVED=$(basename "$CANDIDATE")
            echo "Resolved executable fallback: $RESOLVED"
          else
            echo "Unable to locate executable in $PUBLISH_DIR"
            ls -la "$PUBLISH_DIR" || true
            exit 1
          fi
        fi

        echo "RESOLVED_EXECUTABLE=$RESOLVED" >> "$GITHUB_ENV"

    - name: Set executable permissions (Linux/macOS)
      if: (matrix.os == 'ubuntu-latest' || startsWith(matrix.os, 'macos-')) && matrix.runtime != 'android'
      shell: bash
      run: chmod +x "publish/${{ matrix.runtime }}/${RESOLVED_EXECUTABLE}"

    - name: Compute executable MD5 hash
      if: matrix.runtime != 'android'
      shell: bash
      run: |
        EXEC="publish/${{ matrix.runtime }}/${RESOLVED_EXECUTABLE}"
        # md5sum is available on all GitHub Actions runners (Linux, macOS, Windows via Git Bash)
        if command -v md5sum &>/dev/null; then
          HASH=$(md5sum "$EXEC" | cut -d' ' -f1 | tr '[:upper:]' '[:lower:]')
        elif command -v md5 &>/dev/null; then
          HASH=$(md5 -q "$EXEC" | tr '[:upper:]' '[:lower:]')
        else
          echo "::warning::No md5 tool found on this runner — hash will not be registered"
          HASH=""
        fi

        case "${{ matrix.runtime }}" in
          win-x64|win-arm64) OS_LABEL="Windows" ;;
          linux-x64|linux-arm64) OS_LABEL="Linux" ;;
          osx-x64|osx-arm64) OS_LABEL="macOS" ;;
          *) OS_LABEL="${{ matrix.runtime }}" ;;
        esac

        mkdir -p hash-output
        printf '{"hash":"%s","os":"%s","runtime":"%s"}' "$HASH" "$OS_LABEL" "${{ matrix.runtime }}" \
          > "hash-output/hash-${{ matrix.runtime }}.json"
        echo "Hash for ${{ matrix.runtime }}: $HASH ($OS_LABEL)"

    - name: Upload hash artifact
      if: matrix.runtime != 'android'
      uses: actions/upload-artifact@v4
      with:
        name: hash-${{ matrix.runtime }}-${{ needs.version.outputs.version }}
        path: hash-output/hash-${{ matrix.runtime }}.json
        retention-days: 30

    - name: Create Velopack package
      if: matrix.runtime != 'android'
      shell: bash
      run: |
        if [[ "${{ matrix.runtime }}" == osx-* ]] && [[ "${{ matrix.os }}" != macos* ]]; then
          # Cross-building macOS on Linux: create plain zip fallback instead of vpk.
          mkdir -p Releases
          ZIP_NAME="osu.app.Intel.zip"
          if [[ "${{ matrix.runtime }}" == "osx-arm64" ]]; then
            ZIP_NAME="osu.app.Apple.Silicon.zip"
          fi
          (
            cd "publish/${{ matrix.runtime }}"
            zip -r "../../Releases/${ZIP_NAME}" .
          )
        elif [[ "${{ matrix.runtime }}" == osx-* ]]; then
          # Use icns if available, fallback to ico
          ICON_FILE="osu.Desktop/lazer.ico"
          if [ -f "osu.Desktop/lazer.icns" ] && [ -s "osu.Desktop/lazer.icns" ]; then
            ICON_FILE="osu.Desktop/lazer.icns"
            echo "Using lazer.icns for macOS packaging"
          else
            echo "Using lazer.ico as fallback for macOS packaging"
          fi

          CHANNEL="osx-x64"
          if [[ "${{ matrix.runtime }}" == "osx-arm64" ]]; then CHANNEL="osx-arm64"; fi

          vpk pack \
            -u "osu-torii" \
            -v "${{ needs.version.outputs.semver }}" \
            -p "publish/${{ matrix.runtime }}" \
            -e "${RESOLVED_EXECUTABLE}" \
            --packAuthors "Torii Team" \
            --packTitle "osu! Torii" \
            -i "$ICON_FILE" \
            -c "$CHANNEL"
        elif [[ "${{ matrix.runtime }}" == win-* ]]; then
          CHANNEL="win"
          if [[ "${{ matrix.runtime }}" == "win-arm64" ]]; then CHANNEL="win-arm64"; fi
          vpk pack \
            -u "osu-torii" \
            -v "${{ needs.version.outputs.semver }}" \
            -p "publish/${{ matrix.runtime }}" \
            -e "${RESOLVED_EXECUTABLE}" \
            --packAuthors "Torii Team" \
            --packTitle "osu! Torii" \
            -i "osu.Desktop/lazer.ico" \
            -c "$CHANNEL"
        else
          # Linux
          CHANNEL="linux"
          if [[ "${{ matrix.runtime }}" == "linux-arm64" ]]; then CHANNEL="linux-arm64"; fi
          vpk pack \
            -u "osu-torii" \
            -v "${{ needs.version.outputs.semver }}" \
            -p "publish/${{ matrix.runtime }}" \
            -e "${RESOLVED_EXECUTABLE}" \
            --packAuthors "Torii Team" \
            --packTitle "osu! Torii" \
            -i "osu.Desktop/lazer.ico" \
            -c "$CHANNEL"
        fi

    - name: Normalize asset names (optional)
      shell: bash
      run: |
        shopt -s nullglob
        # Windows installer rename to install.exe if present
        if [[ "${{ matrix.runtime }}" == win-* ]]; then
          installers=(Releases/*-Setup.exe Releases/Setup.exe)
          for f in "${installers[@]}"; do
            if [[ -f "$f" ]]; then
              mv -f "$f" "Releases/install-${{ matrix.runtime }}.exe"
              break
            fi
          done

          portables=(Releases/*-Portable.zip)
          for f in "${portables[@]}"; do
            if [[ -f "$f" ]]; then
              mv -f "$f" "Releases/portable-${{ matrix.runtime }}.zip"
              break
            fi
          done
        fi
        # macOS zip rename if present
        if [[ "${{ matrix.runtime }}" == osx-* ]]; then
          if [[ "${{ matrix.runtime }}" == "osx-x64" ]]; then
            for f in Releases/*osx-x64*.zip; do mv -f "$f" Releases/osu.app.Intel.zip; done
            # Ensure nupkg channel naming uses osx-x64-full.nupkg
            for f in Releases/*.nupkg; do
              if [[ "$f" == *osx*full.nupkg ]] && [[ "$f" != *arm64* ]]; then
                base=$(basename "$f")
                mv -f "$f" "Releases/${base/osx-full.nupkg/osx-x64-full.nupkg}"
              fi
            done
          else
            for f in Releases/*osx-arm64*.zip; do mv -f "$f" Releases/osu.app.Apple.Silicon.zip; done
            # Ensure nupkg channel naming uses osx-arm64-full.nupkg
            for f in Releases/*.nupkg; do
              if [[ "$f" == *osx*full.nupkg ]]; then
                base=$(basename "$f")
                # If upstream already names arm64 correctly, skip; otherwise replace generic osx-full
                if [[ "$base" != *osx-arm64-full.nupkg ]]; then
                  mv -f "$f" "Releases/${base/osx-full.nupkg/osx-arm64-full.nupkg}"
                fi
              fi
            done
          fi
        fi
        # Linux AppImage rename if present
        if [[ "${{ matrix.os }}" == "ubuntu-latest" ]] && [[ "${{ matrix.runtime }}" == linux-* ]]; then
          target="Releases/osu-torii-${{ matrix.runtime }}.AppImage"
          for f in Releases/*.AppImage; do
            if [[ "$f" == "$target" ]]; then
              continue
            fi
            mv -f "$f" "$target"
          done
        fi
        # Android APK rename
        if [[ "${{ matrix.runtime }}" == "android" ]]; then
          mkdir -p Releases
          if [ -f "publish/${{ matrix.runtime }}/${{ matrix.executable }}" ]; then
            cp "publish/${{ matrix.runtime }}/${{ matrix.executable }}" "Releases/osu-torii.apk"
          fi
        fi

    - name: Create portable archive (Windows)
      if: startsWith(matrix.runtime, 'win-')
      shell: pwsh
      run: |
        $runtime = "${{ matrix.runtime }}"
        $publishDir = "publish/$runtime"
        $releaseDir = "Releases"
        New-Item -ItemType Directory -Force -Path $releaseDir | Out-Null

        $portableZip = Join-Path $releaseDir "portable-$runtime.zip"
        if (Test-Path $portableZip) {
          Write-Host "Using existing Velopack portable package: $portableZip"
          exit 0
        }

        if (Test-Path $portableZip) {
          Remove-Item $portableZip -Force
        }

        Compress-Archive -Path (Join-Path $publishDir '*') -DestinationPath $portableZip
        Write-Host "Created portable package: $portableZip"

    - name: Create portable archive (Linux/macOS)
      if: startsWith(matrix.runtime, 'linux-') || startsWith(matrix.runtime, 'osx-')
      shell: bash
      run: |
        mkdir -p Releases

        if [[ "${{ matrix.runtime }}" == linux-* ]]; then
          tar -C "publish/${{ matrix.runtime }}" -czf "Releases/portable-${{ matrix.runtime }}.tar.gz" .
          echo "Created portable package: Releases/portable-${{ matrix.runtime }}.tar.gz"
        else
          (
            cd "publish/${{ matrix.runtime }}"
            zip -r "../../Releases/portable-${{ matrix.runtime }}.zip" .
          )
          echo "Created portable package: Releases/portable-${{ matrix.runtime }}.zip"
        fi

    - name: Verify packaged assets
      shell: bash
      run: |
        required_files=()

        case "${{ matrix.runtime }}" in
          win-x64|win-arm64)
            required_files+=("Releases/install-${{ matrix.runtime }}.exe")
            required_files+=("Releases/portable-${{ matrix.runtime }}.zip")
            ;;
          linux-x64|linux-arm64)
            required_files+=("Releases/osu-torii-${{ matrix.runtime }}.AppImage")
            required_files+=("Releases/portable-${{ matrix.runtime }}.tar.gz")
            ;;
          osx-x64)
            required_files+=("Releases/osu.app.Intel.zip")
            required_files+=("Releases/portable-${{ matrix.runtime }}.zip")
            ;;
          osx-arm64)
            required_files+=("Releases/osu.app.Apple.Silicon.zip")
            required_files+=("Releases/portable-${{ matrix.runtime }}.zip")
            ;;
          android)
            required_files+=("Releases/osu-torii.apk")
            ;;
        esac

        echo "Verifying packaged assets for ${{ matrix.runtime }}"
        missing=0

        for file in "${required_files[@]}"; do
          if [[ ! -f "$file" ]]; then
            echo "::error::Missing expected release asset: $file"
            missing=1
          else
            echo "OK: $file"
          fi
        done

        if [[ $missing -ne 0 ]]; then
          echo "Release packaging output:"
          ls -al Releases || true
          exit 1
        fi

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact-name }}-${{ needs.version.outputs.version }}
        path: |
          publish/${{ matrix.runtime }}/
          Releases/
        retention-days: 30

    - name: Upload installer (Release only)
      if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'release'
      uses: actions/upload-artifact@v4
      with:
        name: installer-${{ matrix.artifact-name }}
        path: Releases/
        retention-days: 90

  verify-build:
    name: CI Build (no release)
    if: github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Checkout osu-framework dependency
      uses: actions/checkout@v4
      with:
        repository: ${{ env.FRAMEWORK_REPOSITORY }}
        fetch-depth: 1
        ref: ${{ env.FRAMEWORK_REF }}
        path: osu-framework
    - name: Checkout osu-resources dependency
      uses: actions/checkout@v4
      with:
        repository: ${{ env.RESOURCES_REPOSITORY }}
        fetch-depth: 1
        ref: ${{ env.RESOURCES_REF }}
        path: osu-resources
    - name: Place dependencies in expected sibling paths
      shell: bash
      run: |
        rm -rf ../osu-framework ../osu-resources
        mv osu-framework ../osu-framework
        mv osu-resources ../osu-resources
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.nuget/packages
          ~/.local/share/NuGet/v3-cache
          ~/.cache/NuGet/v3-cache
        key: ${{ runner.os }}-ci-nuget-${{ hashFiles('**/*.csproj', '**/packages.lock.json', 'nuget.config') }}
        restore-keys: |
          ${{ runner.os }}-ci-nuget-${{ hashFiles('**/*.csproj') }}
          ${{ runner.os }}-ci-nuget-
          ${{ runner.os }}-nuget-
    - name: Restore
      shell: bash
      run: |
        dotnet restore osu.Desktop/osu.Desktop.csproj --configfile nuget.config --verbosity minimal
    - name: Build
      shell: bash
      run: |
        dotnet build osu.Desktop/osu.Desktop.csproj --configuration Release --no-restore --verbosity minimal

  release:
    # Create a GitHub Release when triggered by:
    # - tag push (v*)
    # - release event
    # - workflow_dispatch
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    needs: [build, version]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        pattern: '*'
        merge-multiple: true
        path: artifacts


    - name: Collect release files
      shell: bash
      run: |
        mkdir -p release-files
        shopt -s globstar nullglob
        # copy all files from any Releases/ folder in artifacts
        for f in artifacts/**/Releases/*; do
          cp -f "$f" release-files/
        done
        echo "Collected files:" && ls -al release-files || true

    - name: Verify release bundle completeness
      shell: bash
      run: |
        expected_files=(
          "install-win-x64.exe"
          "install-win-arm64.exe"
          "portable-win-x64.zip"
          "portable-win-arm64.zip"
          "osu-torii-linux-x64.AppImage"
          "osu-torii-linux-arm64.AppImage"
          "portable-linux-x64.tar.gz"
          "portable-linux-arm64.tar.gz"
          "osu.app.Intel.zip"
          "osu.app.Apple.Silicon.zip"
          "portable-osx-x64.zip"
          "portable-osx-arm64.zip"
          "osu-torii.apk"
        )

        missing=0

        for file in "${expected_files[@]}"; do
          if [[ ! -f "release-files/$file" ]]; then
            echo "::error::Release is missing asset: $file"
            missing=1
          else
            echo "OK: release-files/$file"
          fi
        done

        if [[ $missing -ne 0 ]]; then
          echo "Collected release files:"
          ls -al release-files || true
          exit 1
        fi

    # Use the precomputed version as the tag

    - name: Create or update GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ needs.version.outputs.version }}
        target_commitish: ${{ github.sha }}
        name: osu! Torii ${{ needs.version.outputs.version }}
        files: release-files/**
        draft: false
        prerelease: ${{ contains(needs.version.outputs.version, 'alpha') || contains(needs.version.outputs.version, 'beta') || contains(needs.version.outputs.version, 'rc') }}
        generate_release_notes: true
        body: |
          ## osu! Torii ${{ needs.version.outputs.version }}

          Custom osu!(lazer) build for the Torii ecosystem.

          ### Downloads
          - **Windows (x64) Installer:** `install-win-x64.exe`
          - **Windows (ARM64) Installer:** `install-win-arm64.exe`
          - **Windows Portable (x64):** `portable-win-x64.zip`
          - **Windows Portable (ARM64):** `portable-win-arm64.zip`
          - **Linux (x64) AppImage:** `osu-torii-linux-x64.AppImage`
          - **Linux (ARM64) AppImage:** `osu-torii-linux-arm64.AppImage`
          - **Linux Portable (x64):** `portable-linux-x64.tar.gz`
          - **Linux Portable (ARM64):** `portable-linux-arm64.tar.gz`
          - **macOS (Intel):** `osu.app.Intel.zip`
          - **macOS (Apple Silicon):** `osu.app.Apple.Silicon.zip`
          - **macOS Portable (Intel):** `portable-osx-x64.zip`
          - **macOS Portable (Apple Silicon):** `portable-osx-arm64.zip`
          - **Android APK:** `osu-torii.apk`

          ### Installation Notes
          1. Download the installer or portable archive for your platform.
          2. Desktop builds use an isolated data directory (`osu-torii`) to avoid conflicts with official osu!(lazer).
          3. The `osu://` protocol remains unchanged.
          4. First launch may take longer due to initial setup.

          ### Platform Notes
          - **macOS:** If needed, allow the app in System Settings because it is not notarized.
          - **Android:** If your device rejects the APK due to signature policy, use your server distribution page as fallback.
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  register-client-hashes:
    name: Register client hashes with Torii server
    # Run after every successful build (push to master, tag push, or workflow_dispatch).
    # Hashes change with every build of the desktop binaries, so the server needs them
    # registered even before a tagged release exists. Silently skips if the webhook
    # secret/URL aren't configured.
    if: needs.build.result == 'success'
    needs: [build, version]
    runs-on: ubuntu-latest
    steps:
    - name: Download hash artifacts
      uses: actions/download-artifact@v4
      with:
        pattern: hash-*-${{ needs.version.outputs.version }}
        merge-multiple: true
        path: hashes

    - name: Build payload and register with Torii server
      env:
        TORII_SERVER_URL: ${{ vars.TORII_SERVER_URL }}
        TORII_VERSION_WEBHOOK_SECRET: ${{ secrets.TORII_VERSION_WEBHOOK_SECRET }}
        VERSION: ${{ needs.version.outputs.semver }}
      shell: bash
      run: |
        if [[ -z "$TORII_VERSION_WEBHOOK_SECRET" ]]; then
          echo "TORII_VERSION_WEBHOOK_SECRET secret not configured — skipping hash registration."
          echo "Set it in repo Settings → Secrets to enable automatic hash registration."
          exit 0
        fi
        if [[ -z "$TORII_SERVER_URL" ]]; then
          echo "TORII_SERVER_URL variable not configured — skipping hash registration."
          echo "Set it in repo Settings → Variables (e.g. https://api.yourserver.com)."
          exit 0
        fi

        # Collect all hash files into a single JSON object: {md5: os_label}
        HASHES='{}'
        for f in hashes/hash-*.json; do
          [[ -f "$f" ]] || continue
          H=$(python3 -c "import json,sys; d=json.load(open(sys.argv[1])); print(d.get('hash',''))" "$f")
          O=$(python3 -c "import json,sys; d=json.load(open(sys.argv[1])); print(d.get('os',''))" "$f")
          R=$(python3 -c "import json,sys; d=json.load(open(sys.argv[1])); print(d.get('runtime',''))" "$f")
          [[ -z "$H" ]] && { echo "  Skipping $f (empty hash)"; continue; }
          HASHES=$(python3 -c "import json,sys; h=json.loads(sys.argv[1]); h[sys.argv[2]]=sys.argv[3]; print(json.dumps(h))" "$HASHES" "$H" "$O")
          echo "  $R -> $H ($O)"
        done

        PAYLOAD=$(python3 -c "import json,sys; print(json.dumps({'version': sys.argv[1], 'client_name': 'osu! Torii', 'hashes': json.loads(sys.argv[2])}))" "$VERSION" "$HASHES")

        echo "Registering ${#HASHES} hashes for osu! Torii $VERSION …"

        HTTP_STATUS=$(curl -s -o /tmp/register_resp.json -w "%{http_code}" \
          -X POST "${TORII_SERVER_URL}/api/private/client-versions/register" \
          -H "Authorization: Bearer $TORII_VERSION_WEBHOOK_SECRET" \
          -H "Content-Type: application/json" \
          -d "$PAYLOAD")

        echo "HTTP $HTTP_STATUS:"
        cat /tmp/register_resp.json || true

        if [[ "$HTTP_STATUS" == "200" ]]; then
          echo "Hash registration successful!"
        else
          echo "::warning::Hash registration returned HTTP $HTTP_STATUS — scores will still work, hashes can be registered manually via the admin panel"
        fi

  notify:
    if: always()
    needs: [build, release]
    runs-on: ubuntu-latest
    steps:
    - name: Notify build result
      run: |
        if [[ "${{ needs.build.result }}" == "success" ]]; then
          echo "Build succeeded."
        else
          echo "Build failed."
          exit 1
        fi
