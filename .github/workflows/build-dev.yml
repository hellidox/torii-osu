name: Build Dev

on:
  push:
    branches: [ develop, feature/* ]
  pull_request:
    branches: [ develop ]

env:
  DOTNET_VERSION: '8.0.x'

jobs:
  build-dev:
    name: Quick Build Check
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Checkout osu-framework dependency
      uses: actions/checkout@v4
      with:
        repository: ShikkesoraSIM/torii-framework
        fetch-depth: 1
        path: osu-framework

    - name: Checkout osu-resources dependency
      uses: actions/checkout@v4
      with:
        repository: ShikkesoraSIM/torii-resources
        fetch-depth: 1
        path: osu-resources

    - name: Place dependencies in expected sibling paths
      shell: bash
      run: |
        rm -rf ../osu-framework ../osu-resources
        mv osu-framework ../osu-framework
        mv osu-resources ../osu-resources

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.nuget/packages
          ~/.local/share/NuGet/v3-cache
          ~/.cache/NuGet/v3-cache
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/packages.lock.json', 'nuget.config') }}
        restore-keys: |
          ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          ${{ runner.os }}-nuget-

    - name: Restore dependencies
      timeout-minutes: 15
      run: dotnet restore osu.Desktop/osu.Desktop.csproj --verbosity normal --configfile nuget.config --no-cache

    - name: Build project
      run: dotnet build osu.Desktop/osu.Desktop.csproj -c Release --no-restore

    - name: Run tests (if any)
      run: dotnet test osu.Game.Tests/ --no-restore --verbosity normal
      continue-on-error: true

    - name: Build summary
      run: |
        echo "Development build check completed."
        echo "This is a fast CI verification run and does not generate installers."
        echo "Push to main/master or create a tag to trigger full release builds."
